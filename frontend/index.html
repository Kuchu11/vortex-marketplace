<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Marketplace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <h1 class="brand-title">Vortex</h1>
            <button class="btn-primary" id="btn-open-modal">Anunciar Item</button>
        </div>
    </header>

    <main class="content-container">
        <section class="listings-section">
            <h2 class="section-title">Desapegos Recentes</h2>
            
            <div class="filter-container" id="filter-container">
                <button class="btn-filter active" data-category="todos">Todos</button>
                <button class="btn-filter" data-category="Eletrônicos">Eletrônicos</button>
                <button class="btn-filter" data-category="Livros">Livros</button>
                <button class="btn-filter" data-category="Móveis">Móveis</button>
                <button class="btn-filter" data-category="Outros">Outros</button>
            </div>

            <div class="products-grid" id="products-grid"></div>
        </section>
    </main>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3 class="modal-title">Anunciar Novo Desapego</h3>
                <button class="btn-close" id="btn-close-modal">&times;</button>
            </div>
            <form id="form-anuncio" class="modal-form">
                <div class="form-group">
                    <label for="titulo">Título do Item</label>
                    <input type="text" id="titulo" placeholder="Ex: Cadeira de Escritório" required>
                </div>
                <div class="form-group">
                    <label for="categoria">Categoria</label>
                    <input type="text" id="categoria" placeholder="Ex: Móveis, Livros, Eletrônicos" required>
                </div>
                <div class="form-group">
                    <label for="preco">Preço (R$)</label>
                    <input type="number" id="preco" step="0.01" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label for="imagem_url">URL da Imagem</label>
                    <input type="url" id="imagem_url" placeholder="https://linkdaimagem.com/foto.jpg" required>
                </div>
                <div class="form-group">
                    <label for="descricao">Descrição Detalhada</label>
                    <textarea id="descricao" rows="3" placeholder="Descreva o estado do item, tempo de uso, etc." required></textarea>
                </div>
                <button type="submit" class="btn-primary btn-block">Publicar Anúncio</button>
            </form>
        </div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
